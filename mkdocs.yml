site_name: Semtree
site_description: Contexto otimizado para AI assistants. Indexação semântica de código fonte para Claude Code, Cursor, Copilot e Codex.
site_url: https://nikolasdehor.github.io/semtree/
site_author: Nikolas de Hor
repo_url: https://github.com/nikolasdehor/semtree
repo_name: nikolasdehor/semtree
edit_uri: edit/main/docs/

theme:
  name: material
  language: pt-BR
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep purple
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Modo escuro
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep purple
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Modo claro
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.tracking
    - navigation.indexes
    - search.highlight
    - search.suggest
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.action.edit
    - content.tabs.link
  icon:
    repo: fontawesome/brands/github

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/nikolasdehor
    - icon: fontawesome/brands/linkedin
      link: https://www.linkedin.com/in/nikolasdehor
  generator: false

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets:
      base_path: [".", "docs"]
      check_paths: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

plugins:
  - search:
      lang: pt
  - mermaid2
  - gen-files:
      scripts:
        - docs/gen_api_pages.py
  - literate-nav:
      nav_file: SUMMARY.md
  - mkdocstrings:
      default_handler: python
      handlers:
        python:
          paths: [src]
          options:
            docstring_style: google
            show_source: false
            show_root_heading: false
            show_submodules: true
            members_order: source
            separate_signature: true
            filters: ["!^_"]
            heading_level: 2
            merge_init_into_class: true
  - git-revision-date-localized:
      enable_creation_date: true
      type: timeago
      timezone: America/Sao_Paulo
      locale: pt
      fallback_to_build_date: true

nav:
  - Início: index.md
  - Comece aqui:
      - Instalação: getting-started/install.md
      - Quickstart: getting-started/quickstart.md
      - Integrações: getting-started/integrations.md
  - Conceitos:
      - Como funciona: concepts/how-it-works.md
      - Por que tree-sitter: concepts/tree-sitter.md
  - CLI: cli.md
  - MCP server: mcp.md
  - Benchmarks: benchmarks.md
  - Referência API: reference/
  - Contribuir: contributing.md
  - Changelog: changelog.md
