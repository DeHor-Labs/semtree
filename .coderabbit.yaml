# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json
# semtree - Python library para árvores semânticas

language: "pt-BR"
tone_instructions: "Assertivo. Segurança de API, injeção, performance Python. pt-BR, hífens."
# 73 chars

early_access: false

reviews:
  profile: "assertive"
  request_changes_workflow: true
  high_level_summary: true
  review_status: true
  poem: false
  estimate_code_review_effort: true

  auto_review:
    enabled: true
    drafts: false
    base_branches:
      - main

  path_instructions:
    - path: "**/*.py"
      instructions: |
        Python. Verificar:
        - Type hints em todas as funções públicas.
        - Sem `except Exception` sem re-raise ou logging.
        - f-strings em SQL ou comandos shell (risco de injection).
        - Credenciais sempre via os.environ, nunca hardcoded.
        - Async/await correto - sem bloqueio de event loop.

    - path: "src/semtree/**"
      instructions: |
        Núcleo semtree. Verificar:
        - API pública com docstrings e type hints completos.
        - Algoritmos de árvore com invariantes documentados e assertions defensivas.
        - Sem mutação silenciosa de estruturas de entrada (imutabilidade preferida).
        - Erros levantados como exceções tipadas (não retornar None silencioso em falha).
        - Performance: evitar O(n^2) em operações sobre árvores grandes sem documentar trade-off.

    - path: "tests/**"
      instructions: |
        Testes. Verificar:
        - Cobertura de casos de borda (árvore vazia, nó único, ciclos se aplicável).
        - Sem fixtures com side effects que vazam entre testes.
        - Assertions com mensagens descritivas.
        - Sem testes que dependem de ordem de execução.

    - path: ".github/workflows/**"
      instructions: |
        CI/CD: secrets via secrets.*, permissions mínimas, cache não vaza deps privadas.

  path_filters:
    - "!**/__pycache__/**"
    - "!**/*.pyc"
    - "!**/.pytest_cache/**"
    - "!**/.mypy_cache/**"
    - "!**/.ruff_cache/**"
    - "!**/dist/**"
    - "!**/build/**"
    - "!**/*.egg-info/**"
    - "!**/node_modules/**"
    - "!*.lock"
    - "!uv.lock"
    - "!.coderabbit.yaml"

tools:
  ruff:
    enabled: true
  flake8:
    enabled: true
  semgrep:
    enabled: true
  gitleaks:
    enabled: true
  presidio:
    enabled: true
  markdownlint:
    enabled: true

knowledge_base:
  web_search:
    enabled: true
  code_guidelines:
    enabled: true
    filePatterns:
      - "AGENTS.md"
      - ".github/copilot-instructions.md"
  learnings:
    scope: "local"

chat:
  auto_reply: true
